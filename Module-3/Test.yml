name: Tests en feature/examen

on:
    push:
        branches:
            - feature/examen

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout del código
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Instalar dependencias
              run: npm ci

            - name: Pasar los tests
              run: npm test
